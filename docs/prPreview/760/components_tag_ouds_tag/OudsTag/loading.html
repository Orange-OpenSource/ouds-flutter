      <script>
        // Load and setup header with logo
        document.addEventListener("DOMContentLoaded", () => {
          const header = document.querySelector("header#title");
          if (header) {
            // Create the container for the left part of the header
            const headerLeft = document.createElement('div');
            headerLeft.className = 'header-left';
            headerLeft.style.cssText = 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;';

            // Link for the logo
            const logoLink = document.createElement('a');
            logoLink.href = 'https://flutter.unified-design-system.orange.com/';
            logoLink.style.cssText = 'display:flex;align-items:center;flex-shrink:0;';

            // Logo image
            const logoImg = document.createElement('img');
            logoImg.className = 'custom-logo';
            logoImg.style.cssText = 'max-width:100%;height:auto;';

            // Function to check and set the logo from multiple paths
            function checkAndSetLogo(paths, index = 0) {
              if (index >= paths.length) {
                return;
              }
              logoImg.src = paths[index];
              logoImg.onload = () => {
                const header = document.querySelector("header#title");
                if (header) {
                  headerLeft.appendChild(logoLink);
                  const selfNameSpan = document.querySelector('.self-name');
                  if (selfNameSpan) {
                    const link = document.createElement('a');
                    link.href = 'https://flutter.unified-design-system.orange.com/';
                    link.textContent = 'OUDS Flutter';
                    link.style.color = 'var(--white-color)';
                    link.style.cssText = 'color:var(--white-color);text-decoration:none;word-break:break-word;overflow-wrap:break-word;';
                    link.className = 'self-link';
                    selfNameSpan.innerHTML = '';
                    selfNameSpan.appendChild(link);
                  }
                  headerLeft.appendChild(selfNameSpan);
                }
              };
              logoImg.onerror = () => {
                checkAndSetLogo(paths, index + 1);
              };
            }

            logoLink.appendChild(logoImg);
            checkAndSetLogo([
              'orange_logo.svg',
              'assets/orange_logo.svg',
              '../assets/orange_logo.svg',
              '../../assets/orange_logo.svg'
            ]);
            header.appendChild(headerLeft);
          }
        });

        // Load banner image
        document.addEventListener("DOMContentLoaded", () => {
          const bannerImg = document.createElement('img');
          bannerImg.style.cssText = 'width:100%;height:auto;display:block;';

          function trySetImage(paths, index = 0) {
            if (index >= paths.length) {
              return;
            }
            bannerImg.src = paths[index];
            bannerImg.onload = () => {
              const mainContent = document.getElementById('dartdoc-main-content');
              if (mainContent && !mainContent.querySelector('img[style*="width"]')) {
                mainContent.insertAdjacentElement('afterbegin', bannerImg);
              }
            };
            bannerImg.onerror = () => {
              trySetImage(paths, index + 1);
            };
          }

          trySetImage([
            'banner.png',
            'assets/banner.png',
            '../assets/banner.png',
            '../../assets/banner.png'
          ]);
        });

        // Create Core collapsible section
        document.addEventListener("DOMContentLoaded", () => {
          const sidebar = document.getElementById('dartdoc-sidebar-left');
          if (!sidebar) return;

          let ol = null;
          const allOls = sidebar.querySelectorAll('ol');
          for (const candidate of allOls) {
            if (candidate.querySelector('li.section-title')) {
              ol = candidate;
              break;
            }
          }
          if (!ol) return;

          const allItems = Array.from(ol.children);
          const librariesIndex = allItems.findIndex(li =>
            li.classList.contains('section-title') && li.textContent.trim() === 'Libraries'
          );
          if (librariesIndex === -1) return;

          // Hide the "Libraries" title
          allItems[librariesIndex].style.display = 'none';

          // Get all component items after "Libraries"
          const componentItems = allItems.slice(librariesIndex + 1);

          // Create "Core" collapsible header
          const coreLi = document.createElement('li');
          coreLi.style.cssText = 'cursor:pointer;font-weight:bold;font-size:1.125rem;margin-top:5px;margin-bottom:0px;list-style:none;padding:4px 0;display:block;user-select:none;-webkit-user-select:none;min-height:40px;touch-action:manipulation;';

          // Chevron
          const arrow = document.createElement('span');
          arrow.textContent = '›';
          arrow.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;transform:rotate(90deg);transition:transform 0.2s;margin-right:6px;line-height:1;color:#000;font-weight:bold;font-size:24px;flex-shrink:0;';

          // Label
          const label = document.createElement('span');
          label.textContent = ' Core';
          label.style.cssText = 'word-break:break-word;overflow-wrap:break-word;';

          coreLi.appendChild(arrow);
          coreLi.appendChild(label);

          // Nested ol for components — open by default
          const nestedOl = document.createElement('ol');
          nestedOl.style.cssText = 'display:block;padding-left:5px;list-style:none;margin:0;';

          // Move all component items into the nested ol
          componentItems.forEach(item => {
            ol.removeChild(item);
            nestedOl.appendChild(item);
            if (item.classList.contains('section-subtitle')) {
              item.style.display = '';
            }
          });

          // Toggle handler
          let isExpanded = true;
          coreLi.onclick = (e) => {
            e.stopPropagation();
            isExpanded = !isExpanded;
            nestedOl.style.display = isExpanded ? '' : 'none';
            arrow.style.transform = isExpanded ? 'rotate(90deg)' : 'rotate(0deg)';
          };

          // Insert Core header and nested list
          ol.insertBefore(coreLi, allItems[librariesIndex].nextSibling);
          ol.insertBefore(nestedOl, coreLi.nextSibling);

          // Expand by default
          nestedOl.style.display = '';
        });

        // Create collapsible sections for components
        document.addEventListener("DOMContentLoaded", () => {
          document.querySelectorAll('.section-subtitle').forEach((section) => {
            const chevron = document.createElement('span');
            chevron.className = 'section-subtitle-chevron open';
            chevron.textContent = '›';
            chevron.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;margin-right:8px;flex-shrink:0;transition:transform 0.2s ease;color:#000;font-weight:bold;font-size:24px;touch-action:manipulation;transform:rotate(0deg);';

            const label = document.createElement('span');
            label.textContent = section.textContent;
            label.style.cssText = 'word-break:break-word;overflow-wrap:break-word;flex:1;';

            const wrapper = document.createElement('span');
            wrapper.style.cssText = 'display:flex;align-items:center;cursor:pointer;gap:6px;padding:2px 0;user-select:none;-webkit-user-select:none;';
            wrapper.appendChild(chevron);
            wrapper.appendChild(label);

            section.style.minHeight = '40px';
            section.style.padding = '2px 0';

            let isExpanded = false;

            // Hide all following li elements by default
            let next = section.nextElementSibling;
            while (next && !next.classList.contains('section-title') && !next.classList.contains('section-subtitle')) {
              if (next.tagName.toLowerCase() === 'li') {
                next.style.display = 'none';
              }
              next = next.nextElementSibling;
            }

            wrapper.onclick = (e) => {
              e.stopPropagation();
              // Toggle all following li elements
              let next = section.nextElementSibling;
              while (next && !next.classList.contains('section-title') && !next.classList.contains('section-subtitle')) {
                if (next.tagName.toLowerCase() === 'li') {
                  next.style.display = next.style.display === 'none' ? '' : 'none';
                }
                next = next.nextElementSibling;
              }
              // Toggle chevron rotation
              isExpanded = !isExpanded;
              chevron.style.transform = isExpanded ? 'rotate(90deg)' : 'rotate(0deg)';
            };

            section.innerHTML = '';
            section.appendChild(wrapper);
          });
        });

        // Handle sidebar toggle for mobile
        document.addEventListener("DOMContentLoaded", () => {
          const toggleButton = document.getElementById('sidenav-left-toggle');
          const sidebar = document.querySelector('.sidebar-offcanvas-left');

          if (toggleButton && sidebar) {
            // Use dartdoc native class toggle
            toggleButton.addEventListener('click', function(event) {
              event.stopPropagation();
              sidebar.classList.toggle('open');
            });

            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', function(event) {
              if (window.innerWidth <= 840) {
                const isClickInsideSidebar = sidebar.contains(event.target);
                const isClickOnToggle = toggleButton.contains(event.target);

                if (!isClickInsideSidebar && !isClickOnToggle) {
                  sidebar.classList.remove('open');
                }
              }
            });
          }
        });

        // Hide ouds_core package references
        document.addEventListener("DOMContentLoaded", () => {
          const hideOudsCoreElements = () => {
            document.querySelectorAll('*').forEach(element => {
              const text = element.textContent.trim();

              if ((element.classList.contains('self-crumb') && text.includes('ouds_core package')) ||
                  ((element.tagName === 'SPAN' || element.tagName === 'A') &&
                   (text === 'ouds_core' || text === 'ouds_core package')) ||
                  ((element.tagName === 'LI' || element.tagName === 'A') &&
                   element.textContent.trim() === 'ouds_core') ||
                  (element.classList.contains('breadcrumb') && text.includes('ouds_core'))) {
                element.style.display = 'none';
              }
            });

            const packageNameElement = document.querySelector('.package-name');
            if (packageNameElement) {
              packageNameElement.style.display = 'none';
            }
          };

          hideOudsCoreElements();
          setTimeout(hideOudsCoreElements, 100);
          setTimeout(hideOudsCoreElements, 300);
        });

        // Add viewport meta tag
        if (!document.querySelector('meta[name="viewport"]')) {
          const viewportMeta = document.createElement('meta');
          viewportMeta.name = 'viewport';
          viewportMeta.content = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
          document.head.appendChild(viewportMeta);
        }
      </script>
 </footer>
</body>
