<header id="header">
    <link rel="stylesheet" href="static-assets/orange_theme.css" />
    <style>
        #header {
          background-color: #000; /* Fond noir */
          color: #ffffff;
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 10px 30px;
          height: 200px !important;
          box-sizing: border-box;

        }

          .header-left .self-name {
            display: inline !important;
            color: #ffffff !important;
          }

        .header-left {
        color: white
          display: flex;
          align-items: center;
          gap: 15px;
        }

        .header-left img {
          height: 50px;
          width: auto;
        }

        .self-name {
          font-size: 1.5em;
          font-weight: bold;
          color: white;
          letter-spacing: 0.5px;
        }

        .version-dropdown {
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .version-dropdown label {
          font-weight: 500;
        }

        .version-dropdown select {
          background-color: #222;
          color: white;
          border: 1px solid #555;
          padding: 5px 10px;
          border-radius: 6px;
        }

        .version-dropdown select:hover {
          background-color: #333;
        }
    </style>

    <!-- Logo + texte -->
    <div class="header-left">
        <img src="orange_logo.svg" alt="Orange Logo">
        <span class="self-name">OUDS Flutter</span>
    </div>

    <!-- Dropdown version -->
    <div class="version-dropdown">
        <label for="version">Version :</label>
        <select id="version" onchange="window.location=this.value;">
            <option value="https://flutter.unified-design-system.orange.com/">v0.6.0</option>
            <option value="https://orange-opensource.github.io/ouds-flutter/v0.5.0">v0.5.0</option>
            <option value="https://orange-opensource.github.io/ouds-flutter/v0.3.0">v0.3.0</option>
            <option value="https://orange-opensource.github.io/ouds-flutter/v0.2.0">v0.2.0</option>
            <option value="https://orange-opensource.github.io/ouds-flutter/v0.1.0">v0.1.0</option>
        </select>
    </div>
</header>
