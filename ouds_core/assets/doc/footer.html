<!-- Orange-style footer (insert before </body>) -->
<footer class="ods-doc-footer" role="contentinfo" aria-label="Footer">

     <style>
         /* Global variables for theme customization */
        :root {
          --color-key-orange: #f15e00;
          --link-color: #000;
          --active-tab-border-color: #f15e00;
          --active-section-color: #f15e00;
          --sidemenu-section-active-color: #f15e00;
          --color-background: #000;
          --white-color: #fff;

          --footer-go-to-top-color: #fff;
          --footer-background: var(--color-background);
          --color-background-nav: #000;
          --color-background-nav-dt: #000;
          --elements-border-color: rgba(0, 0, 0, 0.2);
          --color-action-hover: rgba(0, 0, 0, 0.68);
          --bs-color-surface-status-warning-muted: rgba(255, 208, 0, 0.16);

          --default-font-family: "Helvetica Neue", helvetica, "Noto Sans", "Liberation Sans", arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";

          --main-header-height: 110px;
          --navigation-padding-top: 10px;
          --navigation-padding-bottom: 0;
          --grid-margin: 16px;
          --sidebar-width: 300px;

          --hero-image-height: 200px;

          /* Font sizes */
          --font-size-body-small: 0.75rem;
          --font-size-body-medium: 0.875rem;
          --font-size-body-large: 1rem;
          --font-size-heading-small: 1.125rem;
          --font-size-heading-medium: 1.25rem;
          --font-size-heading-large: 1.5rem;
          --font-size-heading-xlarge: 2.5rem;
          --font-size-display-small: 2rem;

          /* Line heights */
          --font-line-height-heading-large: 0px;
          --font-line-height-display-small: 40px;
          --font-line-height-body-medium: 14px;

          /* Letter spacing */
          --font-letter-spacing-display-small: -0.32px;
          --font-letter-spacing-heading-large: 0.12px;
          --font-letter-spacing-heading-small: 0.18px;
          --font-letter-spacing-body-large: 0.2px;

          --default-font-size: var(--font-size-body-large);
          --horizontal-spacing-for-content: var(--grid-margin);
        }

        /* Media queries for responsive variables */
        @media (min-width: 736px) {
          :root {
            --dokka-logo-height: 48px;
            --dokka-logo-width: 48px;
            --logo-link-gap: 24px;
            --navigation-padding-top: 44px;
            --navigation-padding-bottom: 16px;
            --grid-margin: 32px;
            --hero-image-height: 170px;

            --font-size-body-large: 1.125rem;
            --font-size-heading-small: 1.5rem;
            --font-size-heading-medium: 1.5rem;
            --font-size-heading-large: 2.25rem;
            --font-size-display-small: 2.5rem;

            --font-line-height-heading-large: 36px;

            --font-letter-spacing-display-small: -0.4px;
            --font-letter-spacing-heading-large: 0.28px;
            --font-letter-spacing-heading-small: 0px;
            --font-letter-spacing-body-large: 0.18px;
          }
        }

        @media (min-width: 1024px) {
          :root {
            --grid-margin: 56px;
            --hero-image-height: 200px;

            --font-size-body-large: 1.125rem;
            --font-size-heading-small: 1.5rem;
            --font-size-heading-medium: 1.75rem;
            --font-size-heading-large: 2.5rem;
            --font-size-display-small: 3rem;

            --font-line-height-heading-large: 40px;
            --font-line-height-display-small: 56px;

            --font-letter-spacing-display-small: -0.6px;
            --font-letter-spacing-heading-large: 0.32px;
            --font-letter-spacing-heading-small: -0.12px;
          }
        }

        /* Body styles */
        body {
          white-space: normal;
        }

        /* Dark theme overrides */
        .dark-theme {
          --link-color: #fff;
          --color-background: #141414;
          --color-key-orange: #ff7900;
          --elements-border-color: rgba(255, 255, 255, 0.2);
          --color-action-hover: rgba(255, 255, 255, 0.64);
          --toc-hover-color: #4a4a52;
          --code-background-color: #141414;
          --active-tab-border-color: #ff7900;
          --active-section-color: #ff7900;
          --sidemenu-section-active-color: #ff7900;
        }

        /* Add a bullet point before section subtitles */
        .section-subtitle::before {
          content: "•";
          font-size: 20px;
          margin-right: 5px;
        }

        /* Sidebar links styling */
        .sidebar-offcanvas-left a {
          color: var(--link-color) !important;
        }

        /* Sidebar inner content styling */
        .sidebar--inner {
          font-size: var(--font-size-body-medium);
          line-height: var(--font-line-height-body-medium);
        }

        /* Dropdown header styling */
        .dropdown--header {
          font-size: var(--font-size-heading-medium);
          font-weight: 700;
        }

        /* Responsive dropdown list width */
        @media (max-width: 439px) {
          .dropdown--list {
            width: 320px;
          }
        }

        /* Markdown description styling */
        .markdown.desc {
          max-width: 100% !important;
          padding-left: 20px !important;
          padding-right: 50px !important;
        }

        /* Hide specific sections */
        .section-title,
        section.summary:not(.offset-anchor),
        .package-kind {
          display: none !important;
        }

        /* Main content padding reset */
        .main-content {
          padding: 0 !important;
        }

        /* Headings styling within main content */
        .main-content :is(h1, h2) {
          padding-top: 40px;
          margin-bottom: 20px;
          font-weight: 700;
          color: var(--color-key-orange);
        }
        .main-content :is(h1) {
          font-size: var(--font-size-display-small);
          line-height: var(--font-line-height-display-small);
          letter-spacing: var(--font-letter-spacing-display-small);
        }
        .main-content :is(h2) {
          font-size: var(--font-size-heading-large);
          line-height: var(--font-line-height-heading-large);
          letter-spacing: var(--font-letter-spacing-heading-large);
        }
        .main-content :is(h3) {
          font-size: var(--font-size-heading-medium);
          margin-bottom: 20px;
        }

        /* Left sidebar styling */
        .sidebar-offcanvas-left {
          min-width: var(--sidebar-width) !important;
          max-height: 100vh !important;
          overflow-y: auto !important;
          overflow-x: auto !important;
          padding-right: 8px;
          word-wrap: break-word !important;
          text-overflow: unset !important;
        }

        /* Hide right sidebar */
        .sidebar-offcanvas-right {
          display: none !important;
        }

        /* Hover styles for links */
        a:hover {
          text-decoration: underline;
          color: var(--color-key-orange) !important;
        }

        /* Content links styling */
        .main-content a:not([data-name]) {
          margin: initial;
          font-weight: 700;
          text-decoration: underline;
          border: none;
          transition: none;
          color: var(--link-color);
        }

        /* Deprecation content box */
        .deprecation-content {
          margin: 1rem 0;
          padding: 1rem;
          background-color: var(--bs-color-surface-status-warning-muted);
        }
        .deprecation-content > h3 {
          font-size: var(--font-size-heading-small);
        }

        /* Table cell styling */
        td:first-child {
          width: 25%;
          padding-left: 0;
        }

        /* Parameters block */
        .parameters {
          display: block;
        }

        /* Theme toggle button */
        #theme-button {
          color: var(--white-color) !important;
        }
        #theme-button:hover {
          color: var(--color-key-orange) !important;
        }

        #search-box {
           display: block !important;
           top: 50% !important;
           transform: translateX(-50%) !important;
           transform: translateY(50%) !important;
         }

        /* Header styling */
        header {
          display: inline-block !important;
          align-items: center !important;
          flex: 0 0 var(--main-header-height) !important;
          background-color: var(--color-background-nav) !important;
        }

        /* Header left section */
        header .header-left {
          display: flex;
          align-items: center;
        }

        /* Version dropdown styling */
        header .version-dropdown select {
          font-size: 1em;
          padding: 5px;
          min-width: 80px;
          background-color: var(--color-background-nav);
          color: var(--white-color);
          border: 0;
        }

        /* User name styling in header */
        header .self-name {
          display: inline-block;
          color: var(--white-color) !important;
          align-self: center;
          font-family: var(--default-font-family);
          font-size: var(--font-size-heading-xlarge);
          font-weight: 700;
          letter-spacing: var(--font-letter-spacing-heading-large);
          margin-left: 2%;
        }

        /* Version dropdown container */
        header .version-dropdown {
          display: flex;
          align-items: center;
          margin-left: 22%;
          margin-top: -2%;
        }

        /* Main content margin reset */
        main {
          margin-top: 0 !important;
          padding-top: 0 !important;
        }

        /* Responsive header adjustments */
        @media(max-width: 840px) {
          header {
            padding-left: 0;
          }
          header:nth-of-type(0) {
            display: none;
          }
        }

     </style>
     <script>
         document.addEventListener("DOMContentLoaded", () => {
         const header = document.querySelector("header#title");
         if (header) {

            // Create the container for the left part of the header
             const headerLeft = document.createElement('div');
             headerLeft.className = 'header-left';

            // Declare the logo image
             const logoImg = document.createElement('img');

            // Function to check and set the logo from multiple paths
             function checkAndSetLogo(paths, index = 0) {
               if (index >= paths.length) {
                 console.log('Logo non trouvé');
                 return;
               }
               logoImg.src = paths[index];
               logoImg.onload = () => {
                    // If the image loads successfully, add it to the header
                 const header = document.querySelector("header#title");
                 if (header) {
                   // Ajouter le logo dans le header
                    headerLeft.appendChild(logoImg);
                    const selfNameSpan = document.querySelector('.self-name');

                       if (selfNameSpan) {
                            // Update the text content
                         selfNameSpan.textContent = 'OUDS Flutter';
                       }
                        // Append the span to the container
                     headerLeft.appendChild(selfNameSpan);
                 }
               };
               logoImg.onerror = () => {
                    // If error, try the next path
                 checkAndSetLogo(paths, index + 1);
               };
             }

            // Call the function with multiple possible logo paths
             checkAndSetLogo(['assets/orange_logo.svg', '../assets/orange_logo.svg', '../../assets/orange_logo.svg']);
             header.appendChild(headerLeft);

         }
         });

    // Create the banner image element
         const bannerImg = document.createElement('img');

    // Function to try setting the banner image from multiple paths
         function trySetImage(paths, index = 0) {
           if (index >= paths.length) {
             console.log('Aucune image trouvée');
             return;
           }
           bannerImg.src = paths[index];
           bannerImg.style.width = '100%';
           bannerImg.style.height = 'auto';
           bannerImg.onload = () => {
                // Insert the banner at the beginning of main content
             const mainContent = document.getElementById('dartdoc-main-content');
             if (mainContent) {
               mainContent.insertAdjacentElement('afterbegin', bannerImg);
             }
           };
           bannerImg.onerror = () => {
            // Remove the image if it fails to load
               if (bannerImg.parentNode) {
                 bannerImg.parentNode.removeChild(bannerImg);
               }
           };
         }

    // Call the function with the banner image path
         trySetImage(['assets/banner.png']);


    // Toggle visibility of sections with class "section-subtitle"
             document.querySelectorAll('.section-subtitle').forEach((section, index) => {
        // Create a span element to act as a clickable button
               const toggleBtn = document.createElement('span');
               toggleBtn.textContent = section.textContent;
               toggleBtn.style.cursor = 'pointer';
               toggleBtn.style.fontWeight = 'bold';
               toggleBtn.onclick = () => {
            // Find all following elements until the next section or end
                 let next = section.nextElementSibling;
                 while (next && !next.classList.contains('section-title') && !next.classList.contains('section-subtitle')) {
                   if (next.tagName.toLowerCase() === 'li') {
                     if (next.style.display === 'none') {
                       next.style.display = '';
                     } else {
                       next.style.display = 'none';
                     }
                   }
                   next = next.nextElementSibling;
                 }
               };
        // Replace the section text with the toggle button
               section.innerHTML = '';
               section.appendChild(toggleBtn);
             });


            // Shorten link texts to start from 'ouds'
             document.querySelectorAll('ol li a').forEach(a => {
               const text = a.textContent;
               const indexOuds = text.indexOf('ouds');
               if (indexOuds !== -1) {
                 a.textContent = text.substring(indexOuds);
               }
             });

                // Function to convert snake_case to PascalCase
                 function snakeToPascal(str) {
                   return str
                     .split('_')
                     .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                     .join('');
                 }
             // Convert link texts from snake_case to PascalCase
                 document.querySelectorAll('ol li a').forEach(a => {
                   const text = a.textContent;
                   const indexOuds = text.indexOf('ouds');
                   if (indexOuds !== -1) {
                     let newText = text.substring(indexOuds); // 'ouds_badge'
                     newText = newText.replace(/_/g, '_');
                     newText = snakeToPascal(newText);
                     a.textContent = newText;
                   }
                 });


            // Initially hide all items with class "section-subitem"
             document.querySelectorAll('.section-subitem').forEach(li => {
               li.style.display = 'none'; //
             });

            // Move the breadcrumb into the main content
        const breadcrumbs = document.querySelector('.breadcrumbs');
         breadcrumbs.style.paddingTop = '20px';
         if (breadcrumbs) {
           console.log('Path:', window.location.pathname);
            // Hide breadcrumbs on home page
             if (window.location.pathname === 'index.html'){
                 breadcrumbs.style.display = 'none !important';
             }else{
               const mainContent = document.getElementById('dartdoc-main-content');
               if (mainContent) {
                // Insert breadcrumbs at the top of main content
                 mainContent.insertAdjacentElement('afterbegin', breadcrumbs);

               }
             }
         }

    // Select all elements that might contain the specific text
            const elements = document.querySelectorAll('.self-crumb');

            elements.forEach(element => {
              if (element.textContent.includes('ouds_core package')) {
            // Hide the element
                element.style.display = 'none';
              }
            });

     </script>
 </footer>
