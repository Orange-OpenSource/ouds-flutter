name: ouds_core
description: 'Contains the main elements of the OUDS Android library.'
version: 0.6.0

environment:
  sdk: ^3.6.0
  flutter: '>=1.17.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Localization setup
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  # Flutter svg
  flutter_svg: ^2.2.0
  # ouds_theme_contract
  ouds_theme_contract: ^0.6.0
dev_dependencies:
  # dartdoc
  dartdoc: ^8.3.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  plugin_platform_interface: ^2.0.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true
  # Flutter plugin declaration for each supported platform
  plugin:
    platforms:
      android:
        # The Android package name where the native implementation resides
        package: com.orange.ouds_accessibility_plugin
        # The main class that registers the plugin on the Android side
        pluginClass: OudsAccessibilityPlugin
        # You can also add iOS support here if needed
        # ios:

# To add assets to your application, add an assets section, like this:
    #assets:

#
# For details regarding assets in packages, see
# https://flutter.dev/to/asset-from-package
#
# An image asset can refer to one or more resolution-specific "variants", see
# https://flutter.dev/to/resolution-aware-images

# To add custom fonts to your package, add a fonts section here,
# in this "flutter" section. Each entry in this list should have a
# "family" key with the font family name, and a "fonts" key with a
# list giving the asset and other descriptors for the font. For
# example:
# fonts:
#   - family: Schyler
#     fonts:
#       - asset: fonts/Schyler-Regular.ttf
#       - asset: fonts/Schyler-Italic.ttf
#         style: italic
#   - family: Trajan Pro
#     fonts:
#       - asset: fonts/TrajanPro.ttf
#       - asset: fonts/TrajanPro_Bold.ttf
#         weight: 700
#
# For details regarding fonts in packages, see
# https://flutter.dev/to/font-from-package
