name: Gitleaks - Secret Scanning

on:
  # Scan on every push except protected branches (already scanned via PR)
  push:
    branches-ignore:
      - main

  workflow_dispatch:

  # Scan on pull requests targeting main or develop
  pull_request:
    types:
      - opened
      - synchronize
    branches-ignore:
      - main

permissions:
  contents: read

# Cancel-in-progress to avoid accumulating runs for the same branch or pull request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml -v --redact
