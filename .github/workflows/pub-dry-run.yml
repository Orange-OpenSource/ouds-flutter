name: Pub.dev Dry Run

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pub-dry-run:
    name: Validate packages for pub.dev
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        package:
          - ouds_core
          - ouds_global_raw_tokens
          - ouds_theme_contract
          - ouds_theme_orange
          - ouds_theme_orange_compact
          - ouds_theme_sosh
          - ouds_theme_wireframe

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Validate ${{ matrix.package }}
        run: |
          cd ${{ matrix.package }}
          echo "📦 Running pub publish --dry-run for ${{ matrix.package }}..."
          flutter pub publish --dry-run

